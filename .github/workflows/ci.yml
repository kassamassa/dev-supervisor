# GitHub Actions CI ワークフロー
# task/* ブランチへの push で自動実行
# 完了後に dev-supervisor ③検証ワークフロー (webhook) を呼び出す

name: CI

on:
  push:
    branches:
      - 'task/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f package.json ]; then npm ci; fi

      - name: Run tests
        id: run_tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then
            pytest tests/ -v --tb=short 2>&1 | tee test_output.txt
          else
            echo "No tests found - marking as passed"
            echo "PASS" > test_output.txt
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_output.txt

  notify_supervisor:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Notify dev-supervisor ③
        env:
          DEV_SUPERVISOR_URL: ${{ secrets.DEV_SUPERVISOR_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONCLUSION="${{ needs.test.result }}"
          BRANCH="${{ github.ref_name }}"

          # ③検証ワークフロー Webhook を呼び出す
          # DEV_SUPERVISOR_URL が設定されている場合のみ
          if [ -n "$DEV_SUPERVISOR_URL" ]; then
            curl -s -X POST "${DEV_SUPERVISOR_URL}/test-result" \
              -H "Content-Type: application/json" \
              -d "{
                \"task_id\": \"\",
                \"project_id\": \"\",
                \"branch_name\": \"${BRANCH}\",
                \"conclusion\": \"${CONCLUSION}\",
                \"error_log\": \"\"
              }" || true
          fi

          echo "Branch: ${BRANCH}, Conclusion: ${CONCLUSION}"
